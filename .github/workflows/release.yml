name: Release

on:
  push:
    branches:
      - main
      - release/*

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - name: Determine version
        id: version
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          if [ "${{ steps.release.outputs.release_created }}" == "true" ]; then
            VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
            TAG="latest"

            # For release branches, check if this is the latest release branch
            if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
              LATEST_BRANCH=$(git branch -r --list 'origin/release/*' --sort=-v:refname | head -n 1 | tr -d ' ')
              CURRENT_BRANCH="origin/${GITHUB_REF#refs/heads/}"
              if [ "$LATEST_BRANCH" != "$CURRENT_BRANCH" ]; then
                TAG="patched"
              fi
            fi
          else
            # RC only on main
            if [[ "$GITHUB_REF" != refs/heads/main ]]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Get next version from the release-please PR branch's package.json
            PR_NUMBER='${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number }}'

            if [ -z "$PR_NUMBER" ]; then
              # No pending release PR — skip to avoid version conflicts
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            PR_HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q .headRefName)
            git fetch origin "$PR_HEAD_BRANCH"
            NEXT_VERSION=$(git show "origin/$PR_HEAD_BRANCH:package.json" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")

            if [ -z "$NEXT_VERSION" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            VERSION="${NEXT_VERSION}-rc.${{ github.run_number }}"
            TAG="rc"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build
        if: ${{ steps.version.outputs.skip != 'true' }}
        run: |
          echo "export const VERSION = '${{ steps.version.outputs.version }}';" > src/version.ts
          npm ci
          npm run build
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Publish
        if: ${{ steps.version.outputs.skip != 'true' }}
        run: |
          EXISTING=$(npm view "@supabase/ssr@${{ steps.version.outputs.version }}" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Version ${{ steps.version.outputs.version }} already published on npm, skipping."
            exit 0
          fi

          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

      - name: Create GitHub pre-release
        if: ${{ steps.version.outputs.tag == 'rc' }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --prerelease
