name: Release

on:
  push:
    branches:
      - main
      - release/*

jobs:
  release_please:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          target-branch: ${{ github.ref_name }}

      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true' }}
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        if: ${{ steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true' }}
        run: |
          if [ "${{ steps.release.outputs.release_created }}" == "true" ]; then
            VERSION="${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
            TAG="latest"

            if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
              LATEST_BRANCH=$(git branch -r --list 'origin/release/*' --sort=-v:refname | head -n 1 | tr -d ' ')
              CURRENT_BRANCH="origin/${GITHUB_REF#refs/heads/}"
              if [ "$LATEST_BRANCH" != "$CURRENT_BRANCH" ]; then
                TAG="patched"
              fi
            fi
          else
            # RC only on main
            if [[ "$GITHUB_REF" != refs/heads/main ]]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Get next version from the pending release-please PR title (accurate, matches what stable will be)
            NEXT_VERSION=$(node -e "
              const title = '${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).title }}';
              const m = title.match(/\d+\.\d+\.\d+/);
              console.log(m ? m[0] : '');
            ")

            if [ -z "$NEXT_VERSION" ]; then
              # No pending release PR yet — skip to avoid version conflicts
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            DESCRIBE=$(git describe --tags --always --match 'v*' --exclude '*-rc*')
            COMMITS=$(echo "$DESCRIBE" | cut -d'-' -f2)
            VERSION="${NEXT_VERSION}-rc.${COMMITS}"
            TAG="rc"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v4
        if: ${{ steps.version.outputs.skip != 'true' && (steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true') }}
        with:
          node-version: 20

      - name: Build release artifacts
        if: ${{ steps.version.outputs.skip != 'true' && (steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true') }}
        run: |
          set -ex

          echo "export const VERSION = '${{ steps.version.outputs.version }}';" > src/version.ts

          npm ci
          npm run build

          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

          echo '//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}' > ~/.npmrc

      - name: Publish
        if: ${{ steps.version.outputs.skip != 'true' && (steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true') }}
        run: |
          EXISTING=$(npm view "@supabase/ssr@${{ steps.version.outputs.version }}" version 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Version ${{ steps.version.outputs.version }} already published on npm, skipping."
            exit 0
          fi

          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

          # Also publish under deprecated auth-helpers names for backward compatibility
          # This helps users still using the old packages (especially due to LLM recommendations)
          echo "Publishing under legacy auth-helpers names..."

          # Publish as @supabase/auth-helpers-nextjs
          echo "Publishing as @supabase/auth-helpers-nextjs..."
          sed -i 's|"name": "@supabase/ssr"|"name": "@supabase/auth-helpers-nextjs"|g' package.json
          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

          # Publish as @supabase/auth-helpers-react
          echo "Publishing as @supabase/auth-helpers-react..."
          sed -i 's|"name": "@supabase/auth-helpers-nextjs"|"name": "@supabase/auth-helpers-react"|g' package.json
          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

          # Publish as @supabase/auth-helpers-remix
          echo "Publishing as @supabase/auth-helpers-remix..."
          sed -i 's|"name": "@supabase/auth-helpers-react"|"name": "@supabase/auth-helpers-remix"|g' package.json
          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

          # Publish as @supabase/auth-helpers-sveltekit
          echo "Publishing as @supabase/auth-helpers-sveltekit..."
          sed -i 's|"name": "@supabase/auth-helpers-remix"|"name": "@supabase/auth-helpers-sveltekit"|g' package.json
          npm publish --provenance --tag ${{ steps.version.outputs.tag }}

          # Restore original package name for consistency
          sed -i 's|"name": "@supabase/auth-helpers-sveltekit"|"name": "@supabase/ssr"|g' package.json

      - name: Create GitHub release and branches
        if: ${{ steps.version.outputs.skip != 'true' && (steps.release.outputs.release_created == 'true' || steps.release.outputs.prs_created == 'true') }}
        run: |
          set -ex

          if [ "${{ steps.version.outputs.tag }}" == "rc" ]; then
            PR_NUMBER='${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number }}'

            GH_TOKEN='${{ github.token }}' gh release \
              create "rc${{ steps.version.outputs.version }}" \
              --title "v${{ steps.version.outputs.version }}" \
              --prerelease \
              -n "This is a release candidate. See release-please PR #$PR_NUMBER for context."

            GH_TOKEN='${{ github.token }}' gh pr comment "$PR_NUMBER" \
              -b "Release candidate [v${{ steps.version.outputs.version }}](https://github.com/supabase/ssr/releases/tag/rc${{ steps.version.outputs.version }}) published."
          else
            if [ "$GITHUB_REF" == "refs/heads/main" ] || [ "$GITHUB_REF" == "refs/heads/master" ]; then
              IS_PATCH_ZERO=$(node -e "console.log('${{ steps.version.outputs.version }}'.endsWith('.0'))")

              if [ "$IS_PATCH_ZERO" == "true" ]; then
                # Only create release branch if patch version is 0, as this
                # means that the release can be patched in the future.

                GH_TOKEN='${{ github.token }}' gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  -H "X-GitHub-Api-Version: 2022-11-28" \
                  /repos/supabase/ssr/git/refs \
                  -f "ref=refs/heads/release/${{ steps.version.outputs.version }}" \
                  -f "sha=$GITHUB_SHA"
              fi
            fi
          fi
